<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GPay Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">
  <div class="screen">

    <div id="payment-screen">
      <h2>Pay</h2>
      
      <p class="receiver">Enter UPI ID or Phone</p>

<input type="text" id="receiver" placeholder="UPI ID or Phone Number">
<input type="number" id="amount" placeholder="Enter amount">

<button onclick="payNow()">Pay</button>

      
    </div>

    <div id="pin-screen" class="hidden">
  <h2>Enter UPI PIN</h2>
  <input type="password" id="pin" placeholder="Enter 4-digit PIN">
  <button onclick="verifyPin()">Confirm</button>
</div>

    <div id="success-screen" class="hidden">
      <div class="checkmark">✔</div>
      
      <p id="success-text"></p>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
